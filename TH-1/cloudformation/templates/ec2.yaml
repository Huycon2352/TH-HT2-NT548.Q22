AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Module - Creates EC2 Security Groups, Key Pair, and Instances'

Parameters:
  ProjectName:
    Type: String
    Description: Project name for resource naming
    Default: nt548-q22

  Environment:
    Type: String
    Description: Environment name
    Default: dev

  VpcId:
    Type: String
    Description: VPC ID from VPC stack

  PublicSubnetId:
    Type: String
    Description: Public Subnet ID from VPC stack

  PrivateSubnetId:
    Type: String
    Description: Private Subnet ID from VPC stack

  AMIId:
    Type: String
    Description: AMI ID for instances
    Default: ami-0543dbdaf4e114be7

  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t3.micro

  KeyName:
    Type: String
    Description: EC2 Key Pair name
    Default: nt548-q22-key

  SSHPort:
    Type: Number
    Description: SSH port
    Default: 22

  SSHSourceCidr:
    Type: String
    Description: CIDR block allowed for SSH to public instance
    Default: 0.0.0.0/0

  PublicInstanceType:
    Type: String
    Description: Tag for public instance type
    Default: Public

  PrivateInstanceType:
    Type: String
    Description: Tag for private instance type
    Default: Private

  PublicSGDescription:
    Type: String
    Description: Public Security Group description
    Default: Security group for public EC2 instance

  PublicSGSSHDescription:
    Type: String
    Description: SSH rule description for public SG
    Default: SSH access

  PrivateSGDescription:
    Type: String
    Description: Private Security Group description
    Default: Security group for private EC2 instance

  PrivateSGSSHDescription:
    Type: String
    Description: SSH rule description for private SG
    Default: SSH from public EC2 instance

  EgressCidr:
    Type: String
    Description: CIDR for egress traffic
    Default: 0.0.0.0/0

Conditions:
  CreateKeyPair: !Equals [!Ref KeyName, 'nt548-q22-key']

Resources:
  # Public EC2 Security Group
  PublicSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-public-ec2-sg'
      GroupDescription: !Ref PublicSGDescription
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref SSHPort
          ToPort: !Ref SSHPort
          CidrIp: !Ref SSHSourceCidr
          Description: !Ref PublicSGSSHDescription
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: !Ref EgressCidr
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-ec2-sg'
        - Key: Environment
          Value: !Ref Environment

  # Private EC2 Security Group
  PrivateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-private-ec2-sg'
      GroupDescription: !Ref PrivateSGDescription
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref SSHPort
          ToPort: !Ref SSHPort
          SourceSecurityGroupId: !Ref PublicSecurityGroup
          Description: !Ref PrivateSGSSHDescription
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: !Ref EgressCidr
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-ec2-sg'
        - Key: Environment
          Value: !Ref Environment

  # Public EC2 Instance
  PublicInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AMIId
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnetId
      SecurityGroupIds:
        - !Ref PublicSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-ec2'
        - Key: Environment
          Value: !Ref Environment
        - Key: Type
          Value: !Ref PublicInstanceType

  # Private EC2 Instance
  PrivateInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AMIId
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateSubnetId
      SecurityGroupIds:
        - !Ref PrivateSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-ec2'
        - Key: Environment
          Value: !Ref Environment
        - Key: Type
          Value: !Ref PrivateInstanceType

Outputs:
  KeyPairName:
    Description: EC2 Key Pair name
    Value: !Ref KeyName
    Export:
      Name: !Sub '${ProjectName}-KeyPairName'

  PublicSecurityGroupId:
    Description: Public Security Group ID
    Value: !Ref PublicSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-PublicSGId'

  PrivateSecurityGroupId:
    Description: Private Security Group ID
    Value: !Ref PrivateSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-PrivateSGId'

  PublicInstanceId:
    Description: Public EC2 Instance ID
    Value: !Ref PublicInstance
    Export:
      Name: !Sub '${ProjectName}-PublicInstanceId'

  PublicInstancePrivateIp:
    Description: Public Instance private IP address
    Value: !GetAtt PublicInstance.PrivateIpAddress
    Export:
      Name: !Sub '${ProjectName}-PublicInstancePrivateIp'

  PublicInstancePublicIp:
    Description: Public Instance public IP address
    Value: !GetAtt PublicInstance.PublicIp
    Export:
      Name: !Sub '${ProjectName}-PublicInstancePublicIp'

  PrivateInstanceId:
    Description: Private EC2 Instance ID
    Value: !Ref PrivateInstance
    Export:
      Name: !Sub '${ProjectName}-PrivateInstanceId'

  PrivateInstancePrivateIp:
    Description: Private Instance private IP address
    Value: !GetAtt PrivateInstance.PrivateIpAddress
    Export:
      Name: !Sub '${ProjectName}-PrivateInstancePrivateIp'

  SSHCommandPublic:
    Description: SSH command to connect to public instance
    Value: !Sub 'ssh -i ~/.ssh/my-project-key-nt548 ubuntu@${PublicInstance.PublicIp}'

  SSHCommandPrivate:
    Description: SSH command to connect to private instance (via NAT)
    Value: !Sub 'ssh -i ~/.ssh/my-project-key-nt548 ubuntu@${PrivateInstance.PrivateIpAddress}'
