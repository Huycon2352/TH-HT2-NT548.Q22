AWSTemplateFormatVersion: '2010-09-09'
Description: 'Main Stack - Orchestrates nested VPC and EC2 stacks for NT548-Q22 project'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Project Configuration"
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: "VPC Network Configuration"
        Parameters:
          - VpcCidr
          - PublicSubnetCidr
          - PrivateSubnetCidr
          - AvailabilityZone
      - Label:
          default: "EC2 Configuration"
        Parameters:
          - AMIId
          - InstanceType
          - KeyName
      - Label:
          default: "Security Configuration"
        Parameters:
          - SSHPort
          - SSHSourceCidr

Parameters:
  ProjectName:
    Type: String
    Description: Project name for resource naming
    Default: nt548-q22

  Environment:
    Type: String
    Description: Environment name (dev, staging, prod)
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  VpcCidr:
    Type: String
    Description: VPC CIDR block
    Default: 10.1.0.0/16

  PublicSubnetCidr:
    Type: String
    Description: Public subnet CIDR block
    Default: 10.1.1.0/24

  PrivateSubnetCidr:
    Type: String
    Description: Private subnet CIDR block
    Default: 10.1.2.0/24

  AvailabilityZone:
    Type: String
    Description: AWS Availability Zone (ap-southeast-1a, ap-southeast-1b, ap-southeast-1c)
    Default: ap-southeast-1a

  AMIId:
    Type: String
    Description: AMI ID for EC2 instances (Ubuntu 22.04 LTS in ap-southeast-1)
    Default: ami-0543dbdaf4e114be7

  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large

  KeyName:
    Type: String
    Description: EC2 Key Pair name to create
    Default: nt548-q22-key

  PublicKeyContent:
    Type: String
    Description: SSH Public Key content (from ~/.ssh/my-project-key-nt548.pub)
    NoEcho: true

  SSHPort:
    Type: Number
    Description: SSH port for access
    Default: 22

  SSHSourceCidr:
    Type: String
    Description: CIDR block allowed for SSH access
    Default: 0.0.0.0/0

  TemplateUrlVpc:
    Type: String
    Description: S3 URL for VPC template (e.g., https://my-bucket.s3.amazonaws.com/vpc.yaml)
    Default: ''

  TemplateUrlEc2:
    Type: String
    Description: S3 URL for EC2 template (e.g., https://my-bucket.s3.amazonaws.com/ec2.yaml)
    Default: ''

Resources:
  # VPC Stack (Nested)
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref TemplateUrlVpc
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        VpcCidr: !Ref VpcCidr
        PublicSubnetCidr: !Ref PublicSubnetCidr
        PrivateSubnetCidr: !Ref PrivateSubnetCidr
        AvailabilityZone: !Ref AvailabilityZone
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc-stack'
        - Key: Environment
          Value: !Ref Environment

  # EC2 Stack (Nested)
  EC2Stack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Ref TemplateUrlEc2
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PublicSubnetId: !GetAtt VPCStack.Outputs.PublicSubnetId
        PrivateSubnetId: !GetAtt VPCStack.Outputs.PrivateSubnetId
        AMIId: !Ref AMIId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        PublicKeyContent: !Ref PublicKeyContent
        SSHPort: !Ref SSHPort
        SSHSourceCidr: !Ref SSHSourceCidr
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-stack'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  VpcId:
    Description: VPC ID
    Value: !GetAtt VPCStack.Outputs.VpcId

  PublicSubnetId:
    Description: Public Subnet ID
    Value: !GetAtt VPCStack.Outputs.PublicSubnetId

  PrivateSubnetId:
    Description: Private Subnet ID
    Value: !GetAtt VPCStack.Outputs.PrivateSubnetId

  NATGatewayEIP:
    Description: NAT Gateway Elastic IP
    Value: !GetAtt VPCStack.Outputs.NATGatewayEIP

  PublicInstanceId:
    Description: Public EC2 Instance ID
    Value: !GetAtt EC2Stack.Outputs.PublicInstanceId

  PublicInstancePrivateIp:
    Description: Public Instance private IP
    Value: !GetAtt EC2Stack.Outputs.PublicInstancePrivateIp

  PublicInstancePublicIp:
    Description: Public Instance public IP
    Value: !GetAtt EC2Stack.Outputs.PublicInstancePublicIp

  PrivateInstanceId:
    Description: Private EC2 Instance ID
    Value: !GetAtt EC2Stack.Outputs.PrivateInstanceId

  PrivateInstancePrivateIp:
    Description: Private Instance private IP
    Value: !GetAtt EC2Stack.Outputs.PrivateInstancePrivateIp

  KeyPairName:
    Description: EC2 Key Pair name
    Value: !GetAtt EC2Stack.Outputs.KeyPairName

  PublicSecurityGroupId:
    Description: Public Security Group ID
    Value: !GetAtt EC2Stack.Outputs.PublicSecurityGroupId

  PrivateSecurityGroupId:
    Description: Private Security Group ID
    Value: !GetAtt EC2Stack.Outputs.PrivateSecurityGroupId

  SSHCommandPublic:
    Description: SSH command to public instance
    Value: !GetAtt EC2Stack.Outputs.SSHCommandPublic

  SSHCommandPrivate:
    Description: SSH command to private instance
    Value: !GetAtt EC2Stack.Outputs.SSHCommandPrivate
